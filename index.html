<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>招生工作日志协作版</title>
    <script src="https://unpkg.com/hydrogen-js-sdk/dist/Bmob-2.2.5.min.js"></script>
    <style>
        :root {
            --apple-blue: #0071e3;
            --apple-green: #34c759;
            --apple-bg: #f5f5f7;
            --apple-card-bg: #ffffff;
            --apple-text-main: #1d1d1f;
            --apple-text-sub: #86868b;
            --apple-border: #d2d2d7;
            --apple-hover: #f5f5f7;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            background-color: var(--apple-bg);
            color: var(--apple-text-main);
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            /* 恢复正常的底部安全距离 */
            padding-bottom: env(safe-area-inset-bottom); 
        }

        .header {
            padding: 16px 20px;
            background-color: rgba(245, 245, 247, 0.85);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid var(--apple-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        /* 顶部标题和保存按钮同行显示 */
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .header h1 {
            margin: 0;
            font-size: 19px;
            font-weight: 600;
            letter-spacing: -0.003em;
        }

        /* 顶部小巧的保存按钮 */
        .header-save-btn {
            background-color: var(--apple-blue);
            color: white;
            border: none;
            border-radius: 980px;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 4px;
            box-shadow: 0 2px 8px rgba(0, 113, 227, 0.3);
            -webkit-tap-highlight-color: transparent;
            white-space: nowrap;
        }

        .header-save-btn:active {
            transform: scale(0.95);
            background-color: #005bb5;
        }

        .filter-group {
            display: flex;
            gap: 8px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }

        button.filter-btn {
            background-color: #e8e8ed;
            border: none;
            color: var(--apple-text-main);
            padding: 6px 14px;
            border-radius: 980px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        button.filter-btn.active {
            background-color: var(--apple-blue);
            color: #ffffff;
        }

        .date-picker {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
            margin-top: 8px;
        }

        input[type="date"] {
            border: 1px solid var(--apple-border);
            background: var(--apple-card-bg);
            border-radius: 8px;
            padding: 4px 8px;
            font-family: inherit;
            color: var(--apple-text-main);
            font-size: 13px;
            outline: none;
        }

        .task-list {
            padding: 20px 16px;
            max-width: 600px;
            margin: 0 auto;
        }

        .task-card {
            background: var(--apple-card-bg);
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
            transition: transform 0.2s;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #f0f0f0;
            padding-bottom: 12px;
            margin-bottom: 12px;
        }

        .date-cell {
            font-weight: 600;
            font-size: 16px;
            color: var(--apple-blue);
        }

        .day-cell {
            font-size: 14px;
            color: var(--apple-text-sub);
            font-weight: 500;
        }

        .card-body {
            line-height: 1.6;
            font-size: 15px;
            position: relative; 
        }

        .tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            background-color: rgba(0, 113, 227, 0.1);
            color: var(--apple-blue);
            margin-bottom: 8px;
            outline: none;
        }

        .task-desc {
            color: var(--apple-text-main);
            outline: none;
            min-height: 24px;
            padding-bottom: 24px; 
        }
        
        .copy-text-btn {
            position: absolute;
            bottom: -8px; 
            right: -8px;
            background-color: transparent;
            color: var(--apple-blue);
            border: none;
            padding: 8px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            opacity: 0.8;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .copy-text-btn:active {
            opacity: 1;
            transform: scale(0.96);
        }

        .copy-text-btn.success {
            color: var(--apple-green);
            opacity: 1;
        }

        [contenteditable="true"]:focus {
            background-color: #f0f8ff;
            border-radius: 4px;
            padding: 2px 4px;
            margin: -2px -4px;
        }

        .card-footer {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px dashed #ebebeb;
            font-size: 13px;
            color: var(--apple-text-sub);
            display: flex;
            gap: 6px;
        }

        .footer-label {
            font-weight: 500;
            white-space: nowrap;
        }

        .footer-content {
            outline: none;
            flex-grow: 1;
            min-height: 18px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--apple-text-sub);
            font-size: 15px;
            display: none;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-top">
        <h1>招生日志协作版</h1>
        <button id="saveBtn" class="header-save-btn" onclick="syncDataToCloud()">🔄 连接...</button>
    </div>
    <div class="filter-group">
        <button class="filter-btn active" onclick="filterData('all', this)">全部</button>
        <button class="filter-btn" onclick="filterData('week', this)">本周</button>
        <button class="filter-btn" onclick="filterData('month', this)">本月</button>
    </div>
    <div class="date-picker">
        <input type="date" id="startDate">
        <span style="color:var(--apple-text-sub); font-size:12px;">至</span>
        <input type="date" id="endDate">
        <button class="filter-btn" onclick="filterByDate()" style="padding: 4px 10px; margin-left:4px;">筛选</button>
    </div>
</div>

<div class="task-list" id="logList">
    <div style="text-align: center; padding: 40px; color: var(--apple-text-sub); font-size: 15px;">
        正在拉取云端任务...
    </div>
</div>

<div id="defaultData" style="display: none;">
    <div class="task-card" data-date="2026-03-26">
        <div class="card-header"><span class="date-cell">2026-03-26</span><span class="day-cell">周四</span></div>
        <div class="card-body">
            <span class="tag" contenteditable="true">工作筹备</span>
            <div class="task-desc" contenteditable="true">招生小组召开首次碰头会。明确组内4人具体分工，梳理现阶段任务目标，制定前期稳步推进的招生策略。</div>
            <button class="copy-text-btn" onclick="copyFormattedTask(this)">📋 复制报备文字</button>
        </div>
        <div class="card-footer"><span class="footer-label">📌 备注:</span><span class="footer-content" contenteditable="true">建议附上会议照片</span></div>
    </div>
</div>

<div id="emptyState" class="empty-state">未找到所选日期的任务记录</div>

<script>
    // 你的 Bmob 秘钥已预填好
    Bmob.initialize("0e505e7e2db6c121", "123456");

    let cloudRecordId = "";

    function getPageData() {
        const cards = document.querySelectorAll('#logList .task-card');
        const data = [];
        cards.forEach(card => {
            const tagEl = card.querySelector('.tag');
            const descEl = card.querySelector('.task-desc');
            const remarkEl = card.querySelector('.footer-content');

            if(tagEl && descEl && remarkEl) {
                data.push({
                    date: card.getAttribute('data-date'),
                    day: card.querySelector('.day-cell').innerText,
                    tag: tagEl.innerText,
                    desc: descEl.innerText,
                    remark: remarkEl.innerText
                });
            }
        });
        return data;
    }

    async function copyFormattedTask(btnElement) {
        const card = btnElement.closest('.task-card');
        const date = card.getAttribute('data-date');
        const day = card.querySelector('.day-cell').innerText;
        const tag = card.querySelector('.tag').innerText;
        const desc = card.querySelector('.task-desc').innerText;

        const textToCopy = `今日招生任务报备：\n日期：${date} (${day})\n【${tag}】\n${desc}`;

        try {
            await navigator.clipboard.writeText(textToCopy);
            const originalHTML = btnElement.innerHTML;
            btnElement.innerHTML = "✅ 已复制";
            btnElement.classList.add('success');
            setTimeout(() => {
                btnElement.innerHTML = originalHTML;
                btnElement.classList.remove('success');
            }, 2000);
        } catch (err) {
            console.error("复制失败:", err);
            alert("手机系统限制，无法自动复制，请手动长按描述文字复制。");
        }
    }

    function renderPage(data) {
        const list = document.getElementById('logList');
        list.innerHTML = "";
        data.forEach(item => {
            const html = `
                <div class="task-card" data-date="${item.date}">
                    <div class="card-header">
                        <span class="date-cell">${item.date}</span>
                        <span class="day-cell">${item.day}</span>
                    </div>
                    <div class="card-body">
                        <span class="tag" contenteditable="true">${item.tag}</span>
                        <div class="task-desc" contenteditable="true">${item.desc}</div>
                        <button class="copy-text-btn" onclick="copyFormattedTask(this)">📋 复制报备文字</button>
                    </div>
                    <div class="card-footer">
                        <span class="footer-label">📌 备注:</span>
                        <span class="footer-content" contenteditable="true">${item.remark}</span>
                    </div>
                </div>
            `;
            list.insertAdjacentHTML('beforeend', html);
        });
    }

    async function loadCloudData() {
        const btn = document.getElementById('saveBtn');
        const query = Bmob.Query("GlobalTaskLog");
        
        try {
            const res = await query.find();
            if (res.length > 0) {
                cloudRecordId = res[0].objectId;
                const onlineData = JSON.parse(res[0].tasksJson);
                renderPage(onlineData);
                btn.innerText = "💾 保存";
            }
        } catch (err) {
            console.error("连接数据库失败:", err);
            btn.innerText = "❌ 连接失败";
        }
    }

    async function syncDataToCloud() {
        if (!cloudRecordId) {
            alert("数据尚未完全加载或连接失败，无法保存！");
            return;
        }
        
        const btn = document.getElementById('saveBtn');
        btn.innerText = "⏳ 上传中";
        
        const currentData = getPageData();
        const query = Bmob.Query("GlobalTaskLog");
        
        try {
            query.set("id", cloudRecordId); 
            query.set("tasksJson", JSON.stringify(currentData));
            await query.save();
            
            btn.innerText = "✅ 成功";
            setTimeout(() => {
                btn.innerText = "💾 保存";
            }, 2000);
        } catch (err) {
            console.error("同步失败:", err);
            alert("保存失败，请检查网络！");
            btn.innerText = "💾 保存";
        }
    }

    window.onload = () => {
        loadCloudData();
    };

    const getToday = () => {
        const d = new Date();
        return new Date(d.getFullYear(), d.getMonth(), d.getDate());
    };

    const parseDate = (dateStr) => {
        const parts = dateStr.split('-');
        return new Date(parts[0], parts[1] - 1, parts[2]);
    };

    function updateActiveButton(clickedBtn) {
        const buttons = document.querySelectorAll('.filter-group button');
        buttons.forEach(btn => btn.classList.remove('active'));
        if(clickedBtn) clickedBtn.classList.add('active');
    }

    function filterData(type, btnElement) {
        updateActiveButton(btnElement);
        const today = getToday();
        const cards = document.querySelectorAll('#logList .task-card');
        let visibleCount = 0;

        const dayOfWeek = today.getDay() || 7; 
        const weekStart = new Date(today);
        weekStart.setDate(today.getDate() - dayOfWeek + 1);
        const weekEnd = new Date(weekStart);
        weekEnd.setDate(weekStart.getDate() + 6);

        const monthStart = new Date(today.getFullYear(), today.getMonth(), 1);
        const monthEnd = new Date(today.getFullYear(), today.getMonth() + 1, 0);

        cards.forEach(card => {
            const rowDate = parseDate(card.getAttribute('data-date'));
            let show = false;
            if (type === 'all') show = true;
            else if (type === 'week') show = rowDate >= weekStart && rowDate <= weekEnd;
            else if (type === 'month') show = rowDate >= monthStart && rowDate <= monthEnd;

            card.style.display = show ? 'block' : 'none';
            if (show) visibleCount++;
        });

        document.getElementById('emptyState').style.display = visibleCount === 0 ? 'block' : 'none';
    }

    function filterByDate() {
        const startInput = document.getElementById('startDate').value;
        const endInput = document.getElementById('endDate').value;
        if (!startInput || !endInput) {
            alert('请选择完整的开始和结束日期');
            return;
        }
        const start = parseDate(startInput);
        const end = parseDate(endInput);
        updateActiveButton(null);
        const cards = document.querySelectorAll('#logList .task-card');
        let visibleCount = 0;

        cards.forEach(card => {
            const rowDate = parseDate(card.getAttribute('data-date'));
            const show = rowDate >= start && rowDate <= end;
            card.style.display = show ? 'block' : 'none';
            if (show) visibleCount++;
        });

        document.getElementById('emptyState').style.display = visibleCount === 0 ? 'block' : 'none';
    }
</script>

</body>
</html>
