<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>招生工作日志协作版</title>
    <script src="https://unpkg.com/hydrogen-js-sdk/dist/Bmob-2.2.5.min.js"></script>
    <style>
        :root {
            --apple-blue: #0071e3;
            --apple-green: #34c759;
            --apple-bg: #f5f5f7;
            --apple-card-bg: #ffffff;
            --apple-text-main: #1d1d1f;
            --apple-text-sub: #86868b;
            --apple-border: #d2d2d7;
            --apple-hover: #f5f5f7;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            background-color: var(--apple-bg);
            color: var(--apple-text-main);
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            padding-bottom: calc(env(safe-area-inset-bottom) + 40px); 
        }

        .header {
            padding: 16px 20px;
            background-color: rgba(245, 245, 247, 0.85);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid var(--apple-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .header h1 {
            margin: 0;
            font-size: 19px;
            font-weight: 600;
            letter-spacing: -0.003em;
        }

        .header-save-btn {
            background-color: var(--apple-blue);
            color: white;
            border: none;
            border-radius: 980px;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 4px;
            box-shadow: 0 2px 8px rgba(0, 113, 227, 0.3);
            -webkit-tap-highlight-color: transparent;
            white-space: nowrap;
        }

        .header-save-btn:active {
            transform: scale(0.95);
            background-color: #005bb5;
        }

        .filter-group {
            display: flex;
            gap: 8px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }

        button.filter-btn {
            background-color: #e8e8ed;
            border: none;
            color: var(--apple-text-main);
            padding: 6px 14px;
            border-radius: 980px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        button.filter-btn.active {
            background-color: var(--apple-blue);
            color: #ffffff;
        }

        .date-picker {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
            margin-top: 8px;
        }

        input[type="date"] {
            border: 1px solid var(--apple-border);
            background: var(--apple-card-bg);
            border-radius: 8px;
            padding: 4px 8px;
            font-family: inherit;
            color: var(--apple-text-main);
            font-size: 13px;
            outline: none;
        }

        .task-list {
            padding: 20px 16px 0 16px;
            max-width: 600px;
            margin: 0 auto;
        }

        .task-card {
            background: var(--apple-card-bg);
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
            transition: transform 0.2s;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #f0f0f0;
            padding-bottom: 12px;
            margin-bottom: 12px;
        }

        .date-cell {
            font-weight: 600;
            font-size: 16px;
            color: var(--apple-blue);
        }

        .day-cell {
            font-size: 14px;
            color: var(--apple-text-sub);
            font-weight: 500;
        }

        .card-body {
            line-height: 1.6;
            font-size: 15px;
        }

        .tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            background-color: rgba(0, 113, 227, 0.1);
            color: var(--apple-blue);
            margin-bottom: 8px;
        }

        .task-desc {
            color: var(--apple-text-main);
            min-height: 24px;
            /* 文本不再允许直接编辑，只做展示 */
            word-break: break-all;
        }
        
        /* 全新设计的底部操作栏 */
        .card-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px dashed #ebebeb;
        }

        .action-btn {
            background-color: transparent;
            border: none;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 4px;
            -webkit-tap-highlight-color: transparent;
        }

        .edit-btn {
            color: var(--apple-text-sub);
            background: #f0f0f2;
        }
        .edit-btn:active { transform: scale(0.95); background: #e0e0e0; }

        .copy-btn {
            color: var(--apple-blue);
            background: rgba(0, 113, 227, 0.1);
        }
        .copy-btn:active { transform: scale(0.95); background: rgba(0, 113, 227, 0.2); }
        .copy-btn.success { background: #e4f8eb; color: var(--apple-green); }

        .card-remark {
            font-size: 13px;
            color: var(--apple-text-sub);
            margin-top: 12px;
            background: #fafafa;
            padding: 8px 12px;
            border-radius: 8px;
            display: inline-block;
            width: 100%;
            box-sizing: border-box;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--apple-text-sub);
            font-size: 15px;
            display: none;
        }

        /* 苹果风格丝滑弹窗设计 */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
            z-index: 2000;
            display: flex; justify-content: center; align-items: center;
            opacity: 0; visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }

        .modal-box {
            background: #fff;
            width: 88%; max-width: 400px;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            /* 弹性缩放动画 */
            transform: scale(0.9) translateY(20px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .modal-overlay.active .modal-box { transform: scale(1) translateY(0); opacity: 1; }

        .modal-box h3 { margin: 0 0 16px 0; font-size: 18px; text-align: center; }
        .modal-box label { font-size: 12px; color: var(--apple-text-sub); margin-bottom: 6px; display: block; font-weight: 500;}
        
        .modal-box input, .modal-box textarea, .modal-box select {
            width: 100%; padding: 12px; border: 1px solid var(--apple-border);
            border-radius: 12px; font-size: 15px; font-family: inherit; box-sizing: border-box;
            margin-bottom: 16px; outline: none; transition: all 0.2s;
            background: #fafafa; color: var(--apple-text-main);
            -webkit-appearance: none; /* 去除原生丑陋样式 */
        }
        .modal-box input:focus, .modal-box textarea:focus, .modal-box select:focus {
            border-color: var(--apple-blue); background: #fff;
            box-shadow: 0 0 0 3px rgba(0,113,227,0.15);
        }

        .modal-btns { display: flex; gap: 12px; margin-top: 8px; }
        .modal-btn { 
            flex: 1; padding: 12px; border-radius: 12px; font-size: 15px; font-weight: 600; 
            border: none; cursor: pointer; transition: all 0.2s; -webkit-tap-highlight-color: transparent;
        }
        .btn-cancel { background: #f0f0f2; color: var(--apple-text-main); }
        .btn-cancel:active { background: #e0e0e0; }
        .btn-confirm { background: var(--apple-blue); color: #fff; }
        .btn-confirm:active { background: #005bb5; }
        
        /* 新增任务大按钮 */
        .add-task-container { text-align: center; padding: 20px 16px 40px 16px; }
        .add-task-btn {
            background: transparent; border: 2px dashed var(--apple-blue); color: var(--apple-blue);
            padding: 12px 24px; border-radius: 980px; font-size: 15px; font-weight: 600;
            cursor: pointer; transition: all 0.2s; -webkit-tap-highlight-color: transparent;
        }
        .add-task-btn:active { background: rgba(0, 113, 227, 0.1); transform: scale(0.96); }

    </style>
</head>
<body>

<div class="header">
    <div class="header-top">
        <h1>招生日志协作版</h1>
        <button id="saveBtn" class="header-save-btn" onclick="syncDataToCloud()">🔄 连接...</button>
    </div>
    <div class="filter-group">
        <button class="filter-btn active" onclick="filterData('all', this)">全部</button>
        <button class="filter-btn" onclick="filterData('week', this)">本周</button>
        <button class="filter-btn" onclick="filterData('month', this)">本月</button>
    </div>
    <div class="date-picker">
        <input type="date" id="startDate">
        <span style="color:var(--apple-text-sub); font-size:12px;">至</span>
        <input type="date" id="endDate">
        <button class="filter-btn" onclick="filterByDate()" style="padding: 4px 10px; margin-left:4px;">筛选</button>
    </div>
</div>

<div class="task-list" id="logList">
    <div style="text-align: center; padding: 40px; color: var(--apple-text-sub); font-size: 15px;" id="loadingText">
        正在拉取云端任务...
    </div>
</div>

<div class="add-task-container">
    <button class="add-task-btn" onclick="openModal(null)">➕ 新增一天日志 (含周末)</button>
</div>

<div id="emptyState" class="empty-state">未找到所选日期的任务记录</div>

<div id="editModal" class="modal-overlay">
    <div class="modal-box">
        <h3 id="modalTitle">编辑任务</h3>
        <div style="display:flex; gap:12px;">
            <div style="flex:2;">
                <label>日期</label>
                <input type="date" id="editDate">
            </div>
            <div style="flex:1;">
                <label>星期</label>
                <select id="editDay">
                    <option value="周一">周一</option><option value="周二">周二</option>
                    <option value="周三">周三</option><option value="周四">周四</option>
                    <option value="周五">周五</option><option value="周六">周六</option>
                    <option value="周日">周日</option>
                </select>
            </div>
        </div>
        <label>标签 (如：资料研读、放假安排)</label>
        <input type="text" id="editTag" placeholder="请输入核心标签...">
        
        <label>任务内容 (支持多行)</label>
        <textarea id="editDesc" rows="4" placeholder="请输入具体的工作计划或留空..."></textarea>
        
        <label>备注补充</label>
        <input type="text" id="editRemark" placeholder="如：需拍摄照片 / 无">
        
        <div class="modal-btns">
            <button class="modal-btn btn-cancel" onclick="closeModal()">取消</button>
            <button class="modal-btn btn-confirm" onclick="saveModal()">确定并保存</button>
        </div>
    </div>
</div>

<script>
    // 你的 Bmob 秘钥
    Bmob.initialize("0e505e7e2db6c121", "123456");

    let cloudRecordId = "";
    let currentEditingCard = null; // 记录当前正在修改哪个卡片

    // 抓取页面数据
    function getPageData() {
        const cards = document.querySelectorAll('#logList .task-card');
        const data = [];
        cards.forEach(card => {
            const tagEl = card.querySelector('.tag');
            const descEl = card.querySelector('.task-desc');
            const remarkEl = card.querySelector('.card-remark');

            if(tagEl && descEl && remarkEl) {
                // 剔除前缀提取纯净数据
                let rawRemark = remarkEl.innerText.replace('📌 备注: ', '');
                data.push({
                    date: card.getAttribute('data-date'),
                    day: card.querySelector('.day-cell').innerText,
                    tag: tagEl.innerText,
                    desc: descEl.innerText,
                    remark: rawRemark
                });
            }
        });
        return data;
    }

    // --- 弹窗相关逻辑 ---
    function openModal(btnElement) {
        if (btnElement) {
            // 编辑现有卡片模式
            currentEditingCard = btnElement.closest('.task-card');
            document.getElementById('modalTitle').innerText = "修改日志";
            
            document.getElementById('editDate').value = currentEditingCard.getAttribute('data-date');
            document.getElementById('editDay').value = currentEditingCard.querySelector('.day-cell').innerText;
            document.getElementById('editTag').value = currentEditingCard.querySelector('.tag').innerText;
            document.getElementById('editDesc').value = currentEditingCard.querySelector('.task-desc').innerText;
            
            let remark = currentEditingCard.querySelector('.card-remark').innerText.replace('📌 备注: ', '');
            document.getElementById('editRemark').value = remark === '无' ? '' : remark;
        } else {
            // 新增卡片模式 (比如新增周末)
            currentEditingCard = null;
            document.getElementById('modalTitle').innerText = "新增日志";
            
            // 自动填充今天的日期，方便操作
            let d = new Date();
            let month = '' + (d.getMonth() + 1), day = '' + d.getDate(), year = d.getFullYear();
            if (month.length < 2) month = '0' + month;
            if (day.length < 2) day = '0' + day;
            document.getElementById('editDate').value = [year, month, day].join('-');
            
            const days = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            document.getElementById('editDay').value = days[d.getDay()];
            
            document.getElementById('editTag').value = "周末休息/自行安排";
            document.getElementById('editDesc').value = "";
            document.getElementById('editRemark').value = "无";
        }

        // 呼出弹窗
        document.getElementById('editModal').classList.add('active');
    }

    function closeModal() {
        document.getElementById('editModal').classList.remove('active');
        currentEditingCard = null;
    }

    function saveModal() {
        const date = document.getElementById('editDate').value;
        const day = document.getElementById('editDay').value;
        const tag = document.getElementById('editTag').value || '待定';
        const desc = document.getElementById('editDesc').value;
        let remark = document.getElementById('editRemark').value || '无';

        if (!date) { alert("日期必须要选哦！"); return; }

        if (currentEditingCard) {
            // 更新当前DOM
            currentEditingCard.setAttribute('data-date', date);
            currentEditingCard.querySelector('.date-cell').innerText = date;
            currentEditingCard.querySelector('.day-cell').innerText = day;
            currentEditingCard.querySelector('.tag').innerText = tag;
            currentEditingCard.querySelector('.task-desc').innerText = desc;
            currentEditingCard.querySelector('.card-remark').innerText = `📌 备注: ${remark}`;
        } else {
            // 生成新卡片DOM (如周末)
            const html = `
                <div class="task-card" data-date="${date}">
                    <div class="card-header">
                        <span class="date-cell">${date}</span>
                        <span class="day-cell">${day}</span>
                    </div>
                    <div class="card-body">
                        <span class="tag">${tag}</span>
                        <div class="task-desc">${desc}</div>
                        <div class="card-remark">📌 备注: ${remark}</div>
                        <div class="card-actions">
                            <button class="action-btn edit-btn" onclick="openModal(this)">✏️ 修改文字</button>
                            <button class="action-btn copy-btn" onclick="copyFormattedTask(this)">📋 复制报备</button>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('logList').insertAdjacentHTML('beforeend', html);
        }

        closeModal();
        // 自动触发云端同步，体验更丝滑
        syncDataToCloud();
    }

    // 复制文字
    async function copyFormattedTask(btnElement) {
        const card = btnElement.closest('.task-card');
        const date = card.getAttribute('data-date');
        const day = card.querySelector('.day-cell').innerText;
        const tag = card.querySelector('.tag').innerText;
        const desc = card.querySelector('.task-desc').innerText;

        const textToCopy = `今日招生任务报备：\n日期：${date} (${day})\n【${tag}】\n${desc}`;

        try {
            await navigator.clipboard.writeText(textToCopy);
            const originalHTML = btnElement.innerHTML;
            btnElement.innerHTML = "✅ 已复制";
            btnElement.classList.add('success');
            setTimeout(() => {
                btnElement.innerHTML = originalHTML;
                btnElement.classList.remove('success');
            }, 2000);
        } catch (err) {
            console.error("复制失败:", err);
            alert("手机系统限制，请手动长按文字复制。");
        }
    }

    // 渲染页面
    function renderPage(data) {
        const list = document.getElementById('logList');
        list.innerHTML = "";
        data.forEach(item => {
            const html = `
                <div class="task-card" data-date="${item.date}">
                    <div class="card-header">
                        <span class="date-cell">${item.date}</span>
                        <span class="day-cell">${item.day}</span>
                    </div>
                    <div class="card-body">
                        <span class="tag">${item.tag}</span>
                        <div class="task-desc">${item.desc}</div>
                        <div class="card-remark">📌 备注: ${item.remark || '无'}</div>
                        <div class="card-actions">
                            <button class="action-btn edit-btn" onclick="openModal(this)">✏️ 修改文字</button>
                            <button class="action-btn copy-btn" onclick="copyFormattedTask(this)">📋 复制报备</button>
                        </div>
                    </div>
                </div>
            `;
            list.insertAdjacentHTML('beforeend', html);
        });
    }

    // 从云端加载
    async function loadCloudData() {
        const btn = document.getElementById('saveBtn');
        const query = Bmob.Query("GlobalTaskLog");
        
        try {
            const res = await query.find();
            if (res.length > 0) {
                cloudRecordId = res[0].objectId;
                const onlineData = JSON.parse(res[0].tasksJson);
                renderPage(onlineData);
                btn.innerText = "💾 手动保存";
            } else {
                document.getElementById('loadingText').innerText = "还没有任务记录，请点击下方新增。";
            }
        } catch (err) {
            console.error("连接数据库失败:", err);
            btn.innerText = "❌ 连接失败";
            document.getElementById('loadingText').innerText = "无法连接云端，请检查网络。";
        }
    }

    // 保存到云端
    async function syncDataToCloud() {
        if (!cloudRecordId) {
            // 如果连记录ID都没有，说明是全新的空库，需要新建一条
            const btn = document.getElementById('saveBtn');
            btn.innerText = "⏳ 上传中";
            const currentData = getPageData();
            const query = Bmob.Query("GlobalTaskLog");
            try {
                query.set("tasksJson", JSON.stringify(currentData));
                const res = await query.save();
                cloudRecordId = res.objectId;
                btn.innerText = "✅ 成功";
                setTimeout(() => { btn.innerText = "💾 手动保存"; }, 2000);
            } catch (err) {
                alert("首次新建数据失败，请重试！");
                btn.innerText = "💾 重试保存";
            }
            return;
        }
        
        const btn = document.getElementById('saveBtn');
        btn.innerText = "⏳ 同步中";
        
        const currentData = getPageData();
        const query = Bmob.Query("GlobalTaskLog");
        
        try {
            query.set("id", cloudRecordId); 
            query.set("tasksJson", JSON.stringify(currentData));
            await query.save();
            
            btn.innerText = "✅ 已云同步";
            setTimeout(() => {
                btn.innerText = "💾 手动保存";
            }, 2000);
        } catch (err) {
            console.error("同步失败:", err);
            alert("保存失败，请检查网络！");
            btn.innerText = "💾 重试保存";
        }
    }

    window.onload = () => {
        loadCloudData();
    };

    // ----- 日期筛选逻辑保持不变 -----
    const getToday = () => {
        const d = new Date();
        return new Date(d.getFullYear(), d.getMonth(), d.getDate());
    };

    const parseDate = (dateStr) => {
        const parts = dateStr.split('-');
        return new Date(parts[0], parts[1] - 1, parts[2]);
    };

    function updateActiveButton(clickedBtn) {
        const buttons = document.querySelectorAll('.filter-group button');
        buttons.forEach(btn => btn.classList.remove('active'));
        if(clickedBtn) clickedBtn.classList.add('active');
    }

    function filterData(type, btnElement) {
        updateActiveButton(btnElement);
        const today = getToday();
        const cards = document.querySelectorAll('#logList .task-card');
        let visibleCount = 0;

        const dayOfWeek = today.getDay() || 7; 
        const weekStart = new Date(today);
        weekStart.setDate(today.getDate() - dayOfWeek + 1);
        const weekEnd = new Date(weekStart);
        weekEnd.setDate(weekStart.getDate() + 6);

        const monthStart = new Date(today.getFullYear(), today.getMonth(), 1);
        const monthEnd = new Date(today.getFullYear(), today.getMonth() + 1, 0);

        cards.forEach(card => {
            const rowDate = parseDate(card.getAttribute('data-date'));
            let show = false;
            if (type === 'all') show = true;
            else if (type === 'week') show = rowDate >= weekStart && rowDate <= weekEnd;
            else if (type === 'month') show = rowDate >= monthStart && rowDate <= monthEnd;

            card.style.display = show ? 'block' : 'none';
            if (show) visibleCount++;
        });

        document.getElementById('emptyState').style.display = visibleCount === 0 ? 'block' : 'none';
    }

    function filterByDate() {
        const startInput = document.getElementById('startDate').value;
        const endInput = document.getElementById('endDate').value;
        if (!startInput || !endInput) {
            alert('请选择完整的开始和结束日期');
            return;
        }
        const start = parseDate(startInput);
        const end = parseDate(endInput);
        updateActiveButton(null);
        const cards = document.querySelectorAll('#logList .task-card');
        let visibleCount = 0;

        cards.forEach(card => {
            const rowDate = parseDate(card.getAttribute('data-date'));
            const show = rowDate >= start && rowDate <= end;
            card.style.display = show ? 'block' : 'none';
            if (show) visibleCount++;
        });

        document.getElementById('emptyState').style.display = visibleCount === 0 ? 'block' : 'none';
    }
</script>

</body>
</html>
